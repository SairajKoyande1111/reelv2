[build]
  command = "npm run build"
  publish = "dist/public"

[functions]
  directory = "server"
  external_node_modules = ["lightningcss", "@babel/core", "@babel/preset-typescript", "tsx", "esbuild"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
